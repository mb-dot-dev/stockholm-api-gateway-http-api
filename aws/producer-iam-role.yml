AWSTemplateFormatVersion: "2010-09-09"
Description: IAM roles for the producer Lambda functions

Parameters:
  QueueArn:
    Type: String
    Description: ARN of the SQS queue
  RoleName:
    Type: String
    Description: Name of the IAM role for the producer Lambda function

Outputs:
  LambdaExecutionRoleArn:
    Description: ARN of the producer Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${RoleName}-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !Ref QueueArn
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
