---
AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template for SQS queue

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    MinLength: 1
    MaxLength: 80
    AllowedPattern: ^[a-zA-Z0-9_-]+$
    ConstraintDescription: Queue name must be alphanumeric, can contain hyphens and underscores

Resources:
  SampleSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 300
      MessageRetentionPeriod: 300
      ReceiveMessageWaitTimeSeconds: 0

Outputs:
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt SampleSQSQueue.Arn

  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref SampleSQSQueue

  QueueName:
    Description: Name of the SQS queue
    Value: !GetAtt SampleSQSQueue.QueueName
