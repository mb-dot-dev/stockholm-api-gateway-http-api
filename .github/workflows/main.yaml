name: Main
run-name: Build & deploy 🚀
on: [push]

env:
  PROJECT_NAME: stockholm

permissions:
  id-token: write # REQUIRED for OIDC
  contents: read
    
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.vars.outputs.project_name }}
      jwt_issuer: ${{ steps.vars.outputs.JWT_ISSUER }}
      jwt_audience: ${{ steps.vars.outputs.JWT_AUDIENCE }}
    steps:
      - id: vars
        run: |
          echo "project_name=${{ env.PROJECT_NAME }}" >> "$GITHUB_OUTPUT"
          echo "JWT_ISSUER=${{ vars.JWT_ISSUER }}" >> "$GITHUB_OUTPUT"
          echo "JWT_AUDIENCE=${{ vars.JWT_AUDIENCE }}" >> "$GITHUB_OUTPUT"

  build-lambda-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build lambda package
        run: |
          make build-lambda-package

      - name: Upload Lambda ZIP artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lambda-zip
          path: lambda.zip
  
  cfn-lint:
    name: CloudFormation Lint
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run cfn-lint
        run: make cfn-lint

  deploy-aws-app:
    name: Deploy AWS Application
    needs: 
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-application
      template: aws/application.yml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }}
  
  deploy-sqs:
    name: Deploy SQS Queue
    needs: 
      - prepare
      - deploy-aws-app
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-sqs
      template: aws/sqs.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        QueueName=${{ needs.prepare.outputs.project_name }}-queue,
        AppTagKey=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagKey }},
        AppTagValue=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagValue }}
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-consumer-iam-role:
    name: Deploy Consumer IAM Role
    needs: 
      - prepare
      - deploy-aws-app
      - deploy-sqs
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-consumer-iam-role
      template: aws/consumer-iam-role.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        AppTagKey=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagKey }},
        AppTagValue=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagValue }},
        QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }},
        RoleName=${{ needs.prepare.outputs.project_name }}-consumer-lambda
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-consumer-lambda:
    name: Deploy Consumer Lambda
    runs-on: ubuntu-latest
    needs: 
      - prepare
      - build-lambda-zip
      - deploy-aws-app
      - deploy-sqs
      - deploy-consumer-iam-role
    steps:
      - uses: actions/checkout@v7

      - name: Download Lambda ZIP artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: lambda-zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          version: 1.161.0
          use-installer: true

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ needs.prepare.outputs.project_name }}-consumer-lambda \
            --template-file consumer-template.yaml \
            --parameter-overrides \
            AppTagValue=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagValue }} \
            FunctionName=${{ needs.prepare.outputs.project_name }}-consumer \
            LambdaExecutionRoleArn=${{ fromJSON(needs.deploy-consumer-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }} \
            QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }}

  deploy-producer-iam-role:
    name: Deploy Producer IAM Role
    needs: 
      - prepare
      - deploy-aws-app
      - deploy-sqs
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-producer-iam-role
      template: aws/producer-iam-role.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        AppTagKey=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagKey }},
        AppTagValue=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagValue }},
        QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }},
        RoleName=${{ needs.prepare.outputs.project_name }}-producer-lambda
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-producer-lambda:
    name: Deploy Producer Lambda
    runs-on: ubuntu-latest
    needs: 
      - prepare
      - build-lambda-zip
      - deploy-aws-app
      - deploy-sqs
      - deploy-producer-iam-role
    outputs:
      function_arn: ${{ steps.output.outputs.FunctionArn }}
      function_name: ${{ steps.output.outputs.FunctionName }}
    steps:
      - uses: actions/checkout@v7

      - name: Download Lambda ZIP artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: lambda-zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          version: 1.161.0
          use-installer: true

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ needs.prepare.outputs.project_name }}-producer-lambda \
            --template-file producer-template.yaml \
            --parameter-overrides \
            AppTagValue=${{ fromJSON(needs.deploy-aws-app.outputs.stack-outputs-json).ApplicationTagValue }} \
            FunctionName=${{ needs.prepare.outputs.project_name }}-producer \
            LambdaExecutionRoleArn=${{ fromJSON(needs.deploy-producer-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }} \
            QueueUrl=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueUrl }} \
            AllowedIps=${{ secrets.ALLOWED_IPS }}
      
      - name: Output Lambda function details
        id: output
        run: |
          echo "FunctionArn=$(aws cloudformation describe-stacks --stack-name ${{ needs.prepare.outputs.project_name }}-producer-lambda --query 'Stacks[0].Outputs[?OutputKey==`FunctionArn`].OutputValue' --output text)" >> "$GITHUB_OUTPUT"
          echo "FunctionName=$(aws cloudformation describe-stacks --stack-name ${{ needs.prepare.outputs.project_name }}-producer-lambda --query 'Stacks[0].Outputs[?OutputKey==`FunctionName`].OutputValue' --output text)" >> "$GITHUB_OUTPUT"

  deploy-api-gateway:
    name: Deploy API Gateway
    needs:
      - prepare
      - deploy-aws-app
      - deploy-producer-lambda
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-api-gateway
      template: aws/api-gateway.yml
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        ProducerFunctionArn=${{ needs.deploy-producer-lambda.outputs.function_arn }},
        ProducerFunctionName=${{ needs.deploy-producer-lambda.outputs.function_name }},
        JwtIssuer=${{ needs.prepare.outputs.jwt_issuer }},
        JwtAudience=${{ needs.prepare.outputs.jwt_audience }}
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit

  deploy-sqs-queue-policy:
    name: Deploy SQS Queue Policy
    needs:
      - prepare
      - deploy-sqs
      - deploy-producer-iam-role
      - deploy-consumer-iam-role
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-sqs-policy
      template: aws/sqs-policy.yml
      parameter-overrides: >-
        QueueArn=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueArn }},
        QueueUrl=${{ fromJSON(needs.deploy-sqs.outputs.stack-outputs-json).QueueUrl }},
        ProducerRoleArn=${{ fromJSON(needs.deploy-producer-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }},
        ConsumerRoleArn=${{ fromJSON(needs.deploy-consumer-iam-role.outputs.stack-outputs-json).LambdaExecutionRoleArn }}
      project: ${{ needs.prepare.outputs.project_name }}
    secrets: inherit
